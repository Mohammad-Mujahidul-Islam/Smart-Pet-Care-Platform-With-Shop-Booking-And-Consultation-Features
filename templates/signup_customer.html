<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Sign Up - PetNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        <a href="/signup" class="inline-flex items-center text-gray-400 hover:text-emerald-600 mb-5 text-sm transition-colors">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back
        </a>
        <div class="text-center mb-6">
            <div class="w-14 h-14 bg-emerald-50 rounded-xl flex items-center justify-center mx-auto mb-3">
                <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-emerald-900">Create Customer Account</h1>
            <p class="text-sm text-gray-500 mt-1">Start shopping for your pets today</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-4">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup/customer" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="name" required placeholder="John Doe"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="tel" name="phone" required placeholder="01XXXXXXXXX"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required minlength="6" placeholder="Min. 6 characters"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="confirm_password" required minlength="6" placeholder="Re-enter password"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                <p id="pw-error" class="text-red-500 text-xs mt-1 hidden">Passwords do not match.</p>
            </div>
            <button type="submit"
                class="w-full bg-emerald-600 text-white font-semibold py-2.5 rounded-lg hover:bg-emerald-700 transition-colors shadow-md mt-2">
                Create Account
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-5">
            Already have an account? <a href="/login" class="text-emerald-600 font-semibold hover:underline">Sign in</a>
        </p>
    </div>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const pw = this.querySelector('[name="password"]').value;
            const cpw = document.getElementById('confirm_password').value;
            const err = document.getElementById('pw-error');
            if (pw !== cpw) { e.preventDefault(); err.classList.remove('hidden'); }
            else { err.classList.add('hidden'); }
        });
    </script>
</body>
</html>
