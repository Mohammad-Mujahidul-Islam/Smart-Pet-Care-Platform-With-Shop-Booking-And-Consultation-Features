<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Sign Up - PetNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        <a href="/signup" class="inline-flex items-center text-gray-400 hover:text-[#5AB9B4] mb-5 text-sm transition-colors">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back
        </a>
        <div class="text-center mb-6">
            <div class="w-14 h-14 bg-teal-50 rounded-xl flex items-center justify-center mx-auto mb-3">
                <svg class="w-7 h-7 text-[#5AB9B4]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-[#2C3E50]">Seller Registration</h1>
            <p class="text-sm text-gray-500 mt-1">Start selling pet products on PetNest</p>
        </div>

        <div class="bg-amber-50 border border-amber-200 text-amber-700 text-xs rounded-lg px-4 py-3 mb-5">
            ⏳ Your account will be reviewed and activated within 24–48 hours.
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-4">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup/seller" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="name" required placeholder="Your full name"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#5AB9B4]">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Business / Store Name</label>
                <input type="text" name="business_name" required placeholder="e.g. Fluffy Paws Store"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#5AB9B4]">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#5AB9B4]">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="tel" name="phone" required placeholder="01XXXXXXXXX"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#5AB9B4]">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Government ID Number</label>
                <input type="text" name="gov_id" required placeholder="NID / Passport number"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#5AB9B4]">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Pickup Address</label>
                <input type="text" name="pickup_address" required placeholder="Where orders will be picked up"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#5AB9B4]">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required minlength="6" placeholder="Min. 6 characters"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#5AB9B4]">
            </div>
            <button type="submit"
                class="w-full bg-[#5AB9B4] text-white font-semibold py-2.5 rounded-lg hover:bg-[#4a9c98] transition-colors shadow-md">
                Submit Application
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-5">
            Already have an account? <a href="/login" class="text-[#5AB9B4] font-semibold hover:underline">Sign in</a>
        </p>
    </div>
</body>
</html>
